<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bingo Card Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans TC", "Noto Sans SC", "Microsoft JhengHei", "Microsoft YaHei", "Apple LiGothic", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      height: 100vh;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sidebar h1 {
      font-size: 20px;
      margin-bottom: 8px;
      color: #1a1a2e;
    }

    .section {
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      overflow: hidden;
    }

    .section-header {
      background: #f8f9fa;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }

    .section-header::after {
      content: '\25B2';
      font-size: 10px;
      color: #999;
      transition: transform 0.2s;
    }

    .section.collapsed .section-header::after {
      transform: rotate(180deg);
    }

    .section.collapsed .section-body {
      display: none;
    }

    .section-body {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .control-group label {
      font-size: 12px;
      font-weight: 600;
      color: #777;
    }

    .control-group select,
    .control-group input[type="text"],
    .control-group input[type="number"],
    .control-group textarea {
      padding: 7px 10px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .control-group input[type="color"] {
      width: 100%;
      height: 36px;
      padding: 2px;
      border: 2px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      background: #fff;
    }

    .control-group select:focus,
    .control-group input:focus,
    .control-group textarea:focus {
      border-color: #4361ee;
    }

    .control-group textarea {
      resize: vertical;
      min-height: 100px;
      font-size: 13px;
    }

    .header-chars-container {
      display: flex;
      gap: 4px;
    }

    .header-char-input {
      width: 100% !important;
      text-align: center;
      font-weight: 700;
      font-size: 15px !important;
      padding: 7px 2px !important;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .row > .control-group {
      flex: 1;
    }

    .mode-toggle {
      display: flex;
      border: 2px solid #4361ee;
      border-radius: 6px;
      overflow: hidden;
    }

    .mode-toggle button {
      flex: 1;
      padding: 8px 4px;
      border: none;
      background: #fff;
      color: #4361ee;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-toggle button.active {
      background: #4361ee;
      color: #fff;
    }

    .file-upload-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-upload {
      padding: 7px 12px;
      background: #f0f0f0;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .btn-upload:hover { background: #e4e4e4; }

    .file-name {
      font-size: 12px;
      color: #888;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hidden-input { display: none; }

    .free-space-options {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .free-space-options label {
      font-size: 13px;
      font-weight: 500;
      color: #444;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .seed-row {
      display: flex;
      gap: 6px;
      align-items: flex-end;
    }

    .seed-row .control-group { flex: 1; }

    .btn-random-seed {
      padding: 7px 10px;
      background: #f0f0f0;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      line-height: 1;
    }

    .btn-random-seed:hover { background: #e4e4e4; }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    .btn-generate {
      flex: 1;
      padding: 12px 16px;
      background: #4361ee;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
    }

    .btn-generate:hover { background: #3a56d4; }

    .btn-print {
      padding: 12px 16px;
      background: #2ec4b6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
    }

    .btn-print:hover { background: #28b0a3; }

    .shortcut-hint {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      margin-top: 2px;
    }

    .item-count-info {
      font-size: 11px;
      color: #888;
      margin-top: -4px;
    }

    .item-count-info.warning { color: #e63946; font-weight: 600; }

    /* ── Main area ── */
    .main {
      flex: 1;
      overflow-y: auto;
      height: 100vh;
    }

    .cards-container {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      padding: 28px;
      justify-content: center;
    }

    .bingo-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.07);
      overflow: hidden;
      page-break-inside: avoid;
      break-inside: avoid;
    }

    .bingo-card-header {
      text-align: center;
      padding: 10px 12px 0;
    }

    .bingo-card-custom-title {
      font-size: 17px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 2px;
    }

    .bingo-card-number {
      font-size: 12px;
      font-weight: 600;
      color: #aaa;
    }

    .bingo-table {
      border-collapse: collapse;
      margin: 10px;
    }

    .bingo-table th,
    .bingo-table td {
      border: 2px solid #e0e0e0;
      text-align: center;
      font-weight: 600;
      vertical-align: middle;
    }

    .bingo-table th {
      background: #4361ee;
      color: #fff;
      font-size: 22px;
      padding: 8px 0;
      width: var(--cell-size, 70px);
      height: var(--header-size, 46px);
    }

    .bingo-table td {
      background: #fafafa;
      padding: 2px;
      width: var(--cell-size, 70px);
      height: var(--cell-size, 70px);
    }

    .bingo-table td.free-space {
      background: #ffd166;
      color: #555;
    }

    .cell-text {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      line-height: 1.15;
      word-break: break-word;
    }

    .cell-img {
      width: 90%;
      height: 90%;
      object-fit: contain;
    }

    /* ── Image upload UI ── */
    .image-thumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .image-thumb {
      position: relative;
      width: 56px;
      height: 56px;
      border-radius: 6px;
      overflow: hidden;
      border: 2px solid #ddd;
    }

    .image-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-thumb .remove-btn {
      position: absolute;
      top: -1px;
      right: -1px;
      width: 18px;
      height: 18px;
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 0 4px 0 4px;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      color: #999;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .drop-zone.dragover {
      border-color: #4361ee;
      background: #f0f4ff;
      color: #4361ee;
    }

    .print-item-list {
      display: none;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 300px;
      color: #bbb;
      font-size: 17px;
      padding: 40px;
      text-align: center;
    }

    /* ── Mobile header & toggle ── */
    .mobile-header {
      display: none;
      background: #fff;
      padding: 12px 16px;
      border-bottom: 1px solid #e0e0e0;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .mobile-header h1 {
      font-size: 18px;
      color: #1a1a2e;
    }

    .mobile-header-actions {
      display: flex;
      gap: 8px;
    }

    .mobile-header-actions button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 99;
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      body { display: block; }

      .mobile-header { display: flex; }

      .sidebar {
        position: fixed;
        left: -320px;
        top: 0;
        width: 85vw;
        min-width: 0;
        max-width: 320px;
        z-index: 100;
        height: 100vh;
        transition: left 0.3s ease;
        box-shadow: 4px 0 20px rgba(0,0,0,0.15);
      }

      .sidebar.open { left: 0; }

      .sidebar-overlay.open {
        display: block;
      }

      .main {
        height: auto;
        min-height: calc(100vh - 52px);
      }

      .cards-container {
        padding: 12px;
        gap: 12px;
      }

      .bingo-card {
        max-width: 100%;
      }

      .bingo-table {
        margin: 6px;
      }

      /* Scale cards to fit phone screens */
      .bingo-table {
        --cell-size: min(14vw, 56px) !important;
        --header-size: min(10vw, 38px) !important;
        margin: 4px;
      }

      .bingo-table th {
        font-size: min(5vw, 18px);
      }

      .bingo-table td {
        font-size: 12px;
      }

      .cell-text {
        font-size: min(3.5vw, 14px) !important;
      }

      .bingo-card-custom-title {
        font-size: 14px;
      }

      .bingo-card-number {
        font-size: 11px;
      }
    }

    /* ── Print ── */
    @media print {
      body { background: #fff; display: block; }
      .sidebar, .sidebar-toggle, .sidebar-overlay { display: none !important; }

      .main {
        height: auto;
        overflow: visible;
      }

      .cards-container {
        padding: 0;
        gap: 0;
        display: grid;
        justify-content: center;
        justify-items: center;
        align-content: start;
      }

      /* Cards-per-page layout classes set by JS — landscape */
      .cards-container.print-1 {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .cards-container.print-2 {
        grid-template-columns: repeat(2, auto);
        gap: 16px;
      }
      .cards-container.print-4 {
        grid-template-columns: repeat(2, auto);
        gap: 12px;
      }
      .cards-container.print-6 {
        grid-template-columns: repeat(3, auto);
        gap: 8px;
      }

      .bingo-card {
        box-shadow: none;
        border: 2px solid #000;
        border-radius: 2px;
        margin: 4px;
      }

      /* Scale up cells for print */
      .bingo-table th, .bingo-table td { border-color: #000; }

      .cards-container.print-1 .bingo-table th,
      .cards-container.print-1 .bingo-table td {
        width: 120px !important;
        height: 120px !important;
        font-size: 28px;
      }
      .cards-container.print-1 .bingo-table th {
        height: 80px !important;
        font-size: 32px;
      }

      .cards-container.print-2 .bingo-table th,
      .cards-container.print-2 .bingo-table td {
        width: 90px !important;
        height: 90px !important;
        font-size: 22px;
      }
      .cards-container.print-2 .bingo-table th {
        height: 60px !important;
        font-size: 26px;
      }

      .cards-container.print-4 .bingo-table th,
      .cards-container.print-4 .bingo-table td {
        width: 72px !important;
        height: 72px !important;
        font-size: 18px;
      }
      .cards-container.print-4 .bingo-table th {
        height: 48px !important;
        font-size: 22px;
      }

      .cards-container.print-6 .bingo-table th,
      .cards-container.print-6 .bingo-table td {
        width: 52px !important;
        height: 52px !important;
        font-size: 14px;
      }
      .cards-container.print-6 .bingo-table th {
        height: 36px !important;
        font-size: 16px;
      }

      .bingo-card-custom-title {
        font-size: 20px;
      }

      /* Let JS auto-shrink handle font sizes; just set a reasonable max */
      .cell-text {
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Force browsers to print background colors — inline styles carry user's choices */
      .bingo-table th,
      .bingo-table td,
      .bingo-table td.free-space {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .page-break {
        break-before: page;
        page-break-before: always;
      }

      .print-item-list {
        display: block !important;
        break-before: page;
        page-break-before: always;
        padding: 12px 0;
        font-size: 20px;
        color: #000;
      }

      .print-item-list h2 {
        font-size: 26px;
        margin-bottom: 10px;
        border-bottom: 2px solid #000;
        padding-bottom: 6px;
      }

      .print-item-list .item-columns {
        column-count: 3;
        column-gap: 24px;
      }

      .print-item-list .item-entry {
        padding: 2px 0;
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .print-item-list .item-entry span.item-num {
        display: inline-block;
        width: 28px;
        color: #666;
        text-align: right;
        margin-right: 6px;
      }

      .print-item-list .image-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .print-item-list .image-grid img {
        width: 80px;
        height: 80px;
        object-fit: contain;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
    }

    @page {
      size: landscape;
      margin: 0.4in;
    }
  </style>
</head>
<body>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar Controls -->
  <aside class="sidebar" id="sidebar">
    <h1>Bingo Generator</h1>

    <!-- Card Setup -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">Card Setup</div>
      <div class="section-body">
        <div class="control-group">
          <label>Card Title</label>
          <input type="text" id="cardTitle" placeholder="e.g. Baby Shower Bingo">
        </div>
        <div class="control-group">
          <label>Grid Size</label>
          <select id="gridSize" onchange="onGridSizeChange()">
            <option value="3">3 &times; 3</option>
            <option value="4">4 &times; 4</option>
            <option value="5" selected>5 &times; 5</option>
            <option value="6">6 &times; 6</option>
            <option value="7">7 &times; 7</option>
          </select>
        </div>
        <div class="control-group">
          <label>Header Characters</label>
          <div id="headerCharsContainer" class="header-chars-container"></div>
        </div>
        <div class="control-group">
          <label>Content Mode</label>
          <div class="mode-toggle">
            <button class="active" id="modeNumbers" onclick="setMode('numbers')">Numbers</button>
            <button id="modeCustom" onclick="setMode('custom')">Text</button>
            <button id="modeImages" onclick="setMode('images')">Images</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Number Settings -->
    <div class="section" id="numberSettings">
      <div class="section-header" onclick="toggleSection(this)">Number Settings</div>
      <div class="section-body">
        <div class="control-group">
          <label>Range Per Column</label>
          <select id="numberRange">
            <option value="15" selected>1 &ndash; 15 per col</option>
            <option value="20">1 &ndash; 20 per col</option>
            <option value="25">1 &ndash; 25 per col</option>
            <option value="30">1 &ndash; 30 per col</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Custom Content -->
    <div class="section hidden" id="customSettings">
      <div class="section-header" onclick="toggleSection(this)">Custom Content</div>
      <div class="section-body">
        <div class="control-group">
          <label>Items (one per line)</label>
          <textarea id="customItems" placeholder="Enter bingo items, one per line...&#10;&#10;e.g.&#10;Says &quot;synergy&quot;&#10;Someone is late&#10;Dog on camera"></textarea>
        </div>
        <div class="item-count-info" id="itemCountInfo"></div>
        <div class="file-upload-row">
          <button class="btn-upload" onclick="document.getElementById('fileInput').click()">Import File</button>
          <span class="file-name" id="fileName">No file chosen</span>
          <input type="file" id="fileInput" class="hidden-input" accept=".txt,.csv" onchange="handleFileUpload(event)">
        </div>
      </div>
    </div>

    <!-- Image Content -->
    <div class="section hidden" id="imageSettings">
      <div class="section-header" onclick="toggleSection(this)">Images</div>
      <div class="section-body">
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('imageInput').click()">
          Drop images here or click to upload
        </div>
        <input type="file" id="imageInput" class="hidden-input" accept="image/*" multiple onchange="handleImageUpload(event)">
        <div class="item-count-info" id="imageCountInfo"></div>
        <div class="image-thumbs" id="imageThumbs"></div>
        <button class="btn-upload" id="clearImagesBtn" onclick="clearImages()" style="display:none">Clear All Images</button>
      </div>
    </div>

    <!-- Free Space -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">Free Space</div>
      <div class="section-body">
        <div class="control-group">
          <label>Position</label>
          <select id="freeSpacePosition">
            <option value="center" selected>Center</option>
            <option value="corners">Four Corners</option>
            <option value="none">None</option>
          </select>
        </div>
        <div class="control-group" id="freeTextGroup">
          <label>Label</label>
          <input type="text" id="freeSpaceText" value="FREE" maxlength="20" placeholder="FREE">
        </div>
      </div>
    </div>

    <!-- Style -->
    <div class="section collapsed">
      <div class="section-header" onclick="toggleSection(this)">Style</div>
      <div class="section-body">
        <div class="row">
          <div class="control-group">
            <label>Cell Font Size</label>
            <select id="cellFontSize" onchange="applyStyleSettings()">
              <option value="auto" selected>Auto</option>
              <option value="10">10px</option>
              <option value="12">12px</option>
              <option value="14">14px</option>
              <option value="16">16px</option>
              <option value="18">18px</option>
              <option value="20">20px</option>
              <option value="24">24px</option>
              <option value="28">28px</option>
              <option value="32">32px</option>
            </select>
          </div>
          <div class="control-group">
            <label>Header Font Size</label>
            <select id="headerFontSize" onchange="applyStyleSettings()">
              <option value="auto" selected>Auto</option>
              <option value="14">14px</option>
              <option value="18">18px</option>
              <option value="22" selected>22px</option>
              <option value="26">26px</option>
              <option value="30">30px</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="control-group">
            <label>Cell Text Color</label>
            <input type="color" id="cellTextColor" value="#1a1a2e" onchange="applyStyleSettings()">
          </div>
          <div class="control-group">
            <label>Header Color</label>
            <input type="color" id="headerBgColor" value="#4361ee" onchange="applyStyleSettings()">
          </div>
        </div>
        <div class="row">
          <div class="control-group">
            <label>Cell Background</label>
            <input type="color" id="cellBgColor" value="#fafafa" onchange="applyStyleSettings()">
          </div>
          <div class="control-group">
            <label>Free Space Color</label>
            <input type="color" id="freeBgColor" value="#ffd166" onchange="applyStyleSettings()">
          </div>
        </div>
        <div class="control-group">
          <label>Text Orientation</label>
          <select id="textOrientation" onchange="applyStyleSettings()">
            <option value="horizontal" selected>Horizontal</option>
            <option value="vertical-rl">Vertical (top to bottom)</option>
            <option value="vertical-lr">Vertical (bottom to top)</option>
            <option value="diagonal">Diagonal (45&deg;)</option>
            <option value="diagonal-down">Diagonal (-45&deg;)</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Print & Generation -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">Print &amp; Generation</div>
      <div class="section-body">
        <div class="row">
          <div class="control-group">
            <label>Cards to Generate</label>
            <select id="cardCount">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="4" selected>4</option>
              <option value="6">6</option>
              <option value="8">8</option>
              <option value="10">10</option>
              <option value="12">12</option>
              <option value="16">16</option>
              <option value="20">20</option>
              <option value="30">30</option>
            </select>
          </div>
          <div class="control-group">
            <label>Cards Per Page</label>
            <select id="cardsPerPage">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="4" selected>4</option>
              <option value="6">6</option>
            </select>
          </div>
        </div>
        <div class="seed-row">
          <div class="control-group">
            <label>Seed (optional)</label>
            <input type="text" id="seed" placeholder="Leave blank for random">
          </div>
          <button class="btn-random-seed" onclick="randomizeSeed()" title="Generate random seed">&#x1f3b2;</button>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
      <button class="btn-generate" onclick="generateCards()">Generate</button>
      <button class="btn-print" onclick="safePrint()">Print / PDF</button>
    </div>
    <div class="shortcut-hint">Enter = Generate &middot; Ctrl+P = Print</div>
  </aside>

  <!-- Main content -->
  <main class="main">
    <!-- Mobile header -->
    <div class="mobile-header">
      <h1>Bingo Generator</h1>
      <div class="mobile-header-actions">
        <button style="background:#4361ee" onclick="toggleSidebar()">Settings</button>
        <button style="background:#2ec4b6" onclick="safePrint()">Print</button>
      </div>
    </div>
    <div id="cardsContainer" class="cards-container print-4">
      <div class="empty-state">Configure settings and click <strong>Generate</strong> to create bingo cards.</div>
    </div>
    <div id="printItemList" class="print-item-list"></div>
  </main>

  <script>
    // ── Seeded PRNG (mulberry32) ──
    function mulberry32(a) {
      return function() {
        a |= 0;
        a = a + 0x6D2B79F5 | 0;
        var t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function hashString(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return hash;
    }

    function getRng() {
      const seedVal = document.getElementById('seed').value.trim();
      if (seedVal) {
        return mulberry32(hashString(seedVal));
      }
      // Use Math.random as the source for a random seed
      return mulberry32((Math.random() * 0xFFFFFFFF) >>> 0);
    }

    function shuffle(arr, rng) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ── State ──
    let currentMode = 'numbers';
    let uploadedImages = []; // array of data URL strings

    const defaultHeaders = {
      3: ['B', 'I', 'N'],
      4: ['B', 'I', 'N', 'G'],
      5: ['B', 'I', 'N', 'G', 'O'],
      6: ['B', 'I', 'N', 'G', 'O', '!'],
      7: ['B', 'I', 'N', 'G', 'O', '!', '!'],
    };

    // ── UI Helpers ──
    function toggleSection(header) {
      header.parentElement.classList.toggle('collapsed');
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('open');
    }

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('modeNumbers').classList.toggle('active', mode === 'numbers');
      document.getElementById('modeCustom').classList.toggle('active', mode === 'custom');
      document.getElementById('modeImages').classList.toggle('active', mode === 'images');
      document.getElementById('numberSettings').classList.toggle('hidden', mode !== 'numbers');
      document.getElementById('customSettings').classList.toggle('hidden', mode !== 'custom');
      document.getElementById('imageSettings').classList.toggle('hidden', mode !== 'images');
      updateItemCount();
      updateImageCount();
    }

    function onGridSizeChange() {
      buildHeaderInputs();
      updateItemCount();
      updateImageCount();
      updateFreeSpaceVisibility();
    }

    function updateFreeSpaceVisibility() {
      const size = parseInt(document.getElementById('gridSize').value);
      const pos = document.getElementById('freeSpacePosition');
      const centerOpt = pos.querySelector('option[value="center"]');
      // Center only available for odd grids
      if (size % 2 === 0 && pos.value === 'center') {
        pos.value = 'none';
      }
      centerOpt.disabled = size % 2 === 0;

      document.getElementById('freeTextGroup').classList.toggle('hidden',
        document.getElementById('freeSpacePosition').value === 'none');
    }

    function buildHeaderInputs() {
      const size = parseInt(document.getElementById('gridSize').value);
      const container = document.getElementById('headerCharsContainer');
      const existing = container.querySelectorAll('.header-char-input');
      const currentValues = Array.from(existing).map(i => i.value);
      container.innerHTML = '';
      const defaults = defaultHeaders[size];
      for (let i = 0; i < size; i++) {
        const input = document.createElement('input');
        input.type = 'text';
        input.maxLength = 6;
        input.className = 'header-char-input';
        input.value = currentValues[i] !== undefined && currentValues[i] !== '' ? currentValues[i] : (defaults[i] || '');
        container.appendChild(input);
      }
    }

    function getHeaders() {
      return Array.from(document.querySelectorAll('.header-char-input')).map(i => i.value || '');
    }

    function randomizeSeed() {
      const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
      let s = '';
      for (let i = 0; i < 8; i++) s += chars[Math.floor(Math.random() * chars.length)];
      document.getElementById('seed').value = s;
    }

    // ── Custom content helpers ──
    function getCustomItems() {
      return document.getElementById('customItems').value
        .split('\n')
        .map(s => s.trim())
        .filter(s => s.length > 0);
    }

    function findDuplicates(items) {
      var seen = {};
      var dupes = [];
      items.forEach(function(item) {
        var key = item.toLowerCase().trim();
        if (seen[key]) {
          if (seen[key] === 1) dupes.push(item);
          seen[key]++;
        } else {
          seen[key] = 1;
        }
      });
      return dupes;
    }

    function updateItemCount() {
      const info = document.getElementById('itemCountInfo');
      if (currentMode !== 'custom') { info.textContent = ''; info.innerHTML = ''; return; }
      const items = getCustomItems();
      const size = parseInt(document.getElementById('gridSize').value);
      const needed = size * size;
      const freePos = document.getElementById('freeSpacePosition').value;
      const freeCount = freePos === 'center' ? 1 : freePos === 'corners' ? 4 : 0;
      const actualNeeded = needed - freeCount;

      var msg = '';
      var cls = 'item-count-info';

      if (items.length < actualNeeded) {
        msg = items.length + ' items entered. Need at least ' + actualNeeded + '.';
        cls = 'item-count-info warning';
      } else {
        msg = items.length + ' items entered (' + actualNeeded + ' needed per card).';
      }

      var dupes = findDuplicates(items);
      if (dupes.length > 0) {
        msg += '\nDuplicates: ' + dupes.join(', ');
        cls = 'item-count-info warning';
      }

      info.className = cls;
      info.textContent = '';
      msg.split('\n').forEach(function(line, i) {
        if (i > 0) info.appendChild(document.createElement('br'));
        info.appendChild(document.createTextNode(line));
      });
    }

    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      document.getElementById('fileName').textContent = file.name;
      const reader = new FileReader();
      reader.onload = function(e) {
        let text = e.target.result;
        // If CSV with commas on single lines, split by comma
        if (file.name.endsWith('.csv') && text.split('\n').length <= 2) {
          text = text.split(',').map(s => s.trim()).filter(Boolean).join('\n');
        }
        document.getElementById('customItems').value = text;
        updateItemCount();
      };
      reader.readAsText(file);
    }

    // ── Image helpers ──
    var MAX_IMG_SIZE = 300; // px – enough for print cells, keeps data URLs small

    function resizeImage(dataUrl) {
      return new Promise(function(resolve) {
        var img = new Image();
        img.onload = function() {
          var w = img.width, h = img.height;
          if (w <= MAX_IMG_SIZE && h <= MAX_IMG_SIZE) {
            resolve(dataUrl);
            return;
          }
          var scale = Math.min(MAX_IMG_SIZE / w, MAX_IMG_SIZE / h);
          var canvas = document.createElement('canvas');
          canvas.width = Math.round(w * scale);
          canvas.height = Math.round(h * scale);
          var ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', 0.85));
        };
        img.src = dataUrl;
      });
    }

    function addImageFromDataUrl(dataUrl) {
      resizeImage(dataUrl).then(function(small) {
        uploadedImages.push(small);
        renderImageThumbs();
        updateImageCount();
      });
    }

    function handleImageUpload(event) {
      var files = Array.from(event.target.files);
      files.forEach(function(file) {
        if (!file.type.startsWith('image/')) return;
        var reader = new FileReader();
        reader.onload = function(e) {
          addImageFromDataUrl(e.target.result);
        };
        reader.readAsDataURL(file);
      });
      event.target.value = '';
    }

    function removeImage(index) {
      uploadedImages.splice(index, 1);
      renderImageThumbs();
      updateImageCount();
    }

    function clearImages() {
      uploadedImages = [];
      renderImageThumbs();
      updateImageCount();
    }

    function renderImageThumbs() {
      const container = document.getElementById('imageThumbs');
      container.innerHTML = '';
      uploadedImages.forEach(function(dataUrl, i) {
        const thumb = document.createElement('div');
        thumb.className = 'image-thumb';
        const img = document.createElement('img');
        img.src = dataUrl;
        thumb.appendChild(img);
        const btn = document.createElement('button');
        btn.className = 'remove-btn';
        btn.textContent = '\u00D7';
        btn.onclick = function() { removeImage(i); };
        thumb.appendChild(btn);
        container.appendChild(thumb);
      });
      document.getElementById('clearImagesBtn').style.display =
        uploadedImages.length > 0 ? '' : 'none';
    }

    function updateImageCount() {
      const info = document.getElementById('imageCountInfo');
      if (currentMode !== 'images') { info.textContent = ''; return; }
      const size = parseInt(document.getElementById('gridSize').value);
      const freePos = document.getElementById('freeSpacePosition').value;
      const freeCount = freePos === 'center' ? 1 : freePos === 'corners' ? 4 : 0;
      const needed = size * size - freeCount;

      if (uploadedImages.length < needed) {
        info.textContent = uploadedImages.length + ' images uploaded. Need at least ' + needed + '.';
        info.className = 'item-count-info warning';
      } else {
        info.textContent = uploadedImages.length + ' images uploaded (' + needed + ' needed per card).';
        info.className = 'item-count-info';
      }
    }

    // ── Drag and drop ──
    (function() {
      const dz = document.getElementById('dropZone');
      dz.addEventListener('dragover', function(e) {
        e.preventDefault();
        dz.classList.add('dragover');
      });
      dz.addEventListener('dragleave', function() {
        dz.classList.remove('dragover');
      });
      dz.addEventListener('drop', function(e) {
        e.preventDefault();
        dz.classList.remove('dragover');
        var files = Array.from(e.dataTransfer.files).filter(function(f) {
          return f.type.startsWith('image/');
        });
        files.forEach(function(file) {
          var reader = new FileReader();
          reader.onload = function(ev) {
            addImageFromDataUrl(ev.target.result);
            renderImageThumbs();
            updateImageCount();
          };
          reader.readAsDataURL(file);
        });
      });
    })();

    // ── Style settings ──
    function getStyleSettings() {
      return {
        cellFontSize: document.getElementById('cellFontSize').value,
        headerFontSize: document.getElementById('headerFontSize').value,
        cellTextColor: document.getElementById('cellTextColor').value,
        headerBgColor: document.getElementById('headerBgColor').value,
        cellBgColor: document.getElementById('cellBgColor').value,
        freeBgColor: document.getElementById('freeBgColor').value,
        textOrientation: document.getElementById('textOrientation').value,
      };
    }

    function getOrientationCSS(orientation) {
      switch (orientation) {
        case 'vertical-rl':
          return { writingMode: 'vertical-rl', transform: 'none' };
        case 'vertical-lr':
          return { writingMode: 'vertical-lr', transform: 'rotate(180deg)' };
        case 'diagonal':
          return { writingMode: '', transform: 'rotate(-45deg)' };
        case 'diagonal-down':
          return { writingMode: '', transform: 'rotate(45deg)' };
        default:
          return { writingMode: '', transform: 'none' };
      }
    }

    function applyStyleSettings() {
      var s = getStyleSettings();
      var container = document.getElementById('cardsContainer');
      var orient = getOrientationCSS(s.textOrientation);

      container.querySelectorAll('.bingo-table th').forEach(function(th) {
        th.style.background = s.headerBgColor;
        if (s.headerFontSize !== 'auto') th.style.fontSize = s.headerFontSize + 'px';
      });
      container.querySelectorAll('.bingo-table td').forEach(function(td) {
        td.style.background = td.classList.contains('free-space') ? s.freeBgColor : s.cellBgColor;
        td.style.color = s.cellTextColor;
      });
      container.querySelectorAll('.cell-text').forEach(function(span) {
        if (s.cellFontSize !== 'auto') span.style.fontSize = s.cellFontSize + 'px';
        span.style.color = s.cellTextColor;
        span.style.writingMode = orient.writingMode;
        span.style.transform = orient.transform;
      });
    }

    // ── Card generation ──
    function generateNumberColumns(size, rangePerCol, rng) {
      const columns = [];
      for (let col = 0; col < size; col++) {
        const min = col * rangePerCol + 1;
        const pool = [];
        for (let n = min; n < min + rangePerCol; n++) pool.push(n);
        columns.push(shuffle(pool, rng).slice(0, size));
      }
      return columns;
    }

    function generateCustomGrid(size, items, rng) {
      const shuffled = shuffle(items, rng);
      const grid = [];
      let idx = 0;
      for (let row = 0; row < size; row++) {
        grid[row] = [];
        for (let col = 0; col < size; col++) {
          grid[row][col] = shuffled[idx++];
        }
      }
      return grid;
    }

    function getFreeCells(size, position) {
      if (position === 'none') return [];
      if (position === 'center') {
        const c = Math.floor(size / 2);
        return [[c, c]];
      }
      if (position === 'corners') {
        return [[0, 0], [0, size - 1], [size - 1, 0], [size - 1, size - 1]];
      }
      return [];
    }

    function cardFingerprint(size, getCell) {
      const parts = [];
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          parts.push(getCell(r, c));
        }
      }
      return parts.join('|');
    }

    function computeCellFontSize(text, cellSize) {
      const len = text.length;
      if (len <= 3) return Math.max(14, cellSize * 0.4);
      if (len <= 6) return Math.max(12, cellSize * 0.3);
      if (len <= 12) return Math.max(10, cellSize * 0.22);
      if (len <= 20) return Math.max(9, cellSize * 0.18);
      return Math.max(7, cellSize * 0.14);
    }

    function createCardElement(cardNumber, size, headers, getCell, freeCells, freeLabel) {
      const cellSize = Math.max(52, 80 - (size - 3) * 7);
      const freeCellSet = new Set(freeCells.map(([r, c]) => r + ',' + c));

      const cardTitle = document.getElementById('cardTitle').value.trim();

      const card = document.createElement('div');
      card.className = 'bingo-card';

      const header = document.createElement('div');
      header.className = 'bingo-card-header';
      if (cardTitle) {
        const customTitle = document.createElement('div');
        customTitle.className = 'bingo-card-custom-title';
        customTitle.textContent = cardTitle;
        header.appendChild(customTitle);
      }
      const numberLabel = document.createElement('div');
      numberLabel.className = 'bingo-card-number';
      numberLabel.textContent = 'Card #' + cardNumber;
      header.appendChild(numberLabel);
      card.appendChild(header);

      const styles = getStyleSettings();
      const orient = getOrientationCSS(styles.textOrientation);

      const table = document.createElement('table');
      table.className = 'bingo-table';

      table.style.setProperty('--cell-size', cellSize + 'px');
      table.style.setProperty('--header-size', Math.round(cellSize * 0.65) + 'px');

      // Header
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      for (let col = 0; col < size; col++) {
        const th = document.createElement('th');
        th.textContent = headers[col];
        th.style.background = styles.headerBgColor;
        if (styles.headerFontSize !== 'auto') th.style.fontSize = styles.headerFontSize + 'px';
        headerRow.appendChild(th);
      }
      thead.appendChild(headerRow);
      table.appendChild(thead);

      // Body
      const tbody = document.createElement('tbody');
      for (let row = 0; row < size; row++) {
        const tr = document.createElement('tr');
        for (let col = 0; col < size; col++) {
          const td = document.createElement('td');

          const span = document.createElement('span');
          span.className = 'cell-text';

          var fontSize;
          if (freeCellSet.has(row + ',' + col)) {
            span.textContent = freeLabel;
            td.classList.add('free-space');
            td.style.background = styles.freeBgColor;
            fontSize = styles.cellFontSize !== 'auto' ? styles.cellFontSize + 'px' : computeCellFontSize(freeLabel, cellSize) + 'px';
            span.style.fontSize = fontSize;
            span.style.fontWeight = '700';
          } else {
            td.style.background = styles.cellBgColor;
            const val = getCell(row, col);
            if (typeof val === 'string' && val.startsWith('data:image')) {
              const img = document.createElement('img');
              img.src = val;
              img.className = 'cell-img';
              span.appendChild(img);
            } else {
              const text = String(val);
              span.textContent = text;
              fontSize = styles.cellFontSize !== 'auto' ? styles.cellFontSize + 'px' : computeCellFontSize(text, cellSize) + 'px';
              span.style.fontSize = fontSize;
            }
          }
          span.style.color = styles.cellTextColor;
          span.style.writingMode = orient.writingMode;
          span.style.transform = orient.transform;

          td.appendChild(span);
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      card.appendChild(table);
      return card;
    }

    function generateCards() {
      const size = parseInt(document.getElementById('gridSize').value);
      const count = parseInt(document.getElementById('cardCount').value);
      const cardsPerPage = parseInt(document.getElementById('cardsPerPage').value);
      const freePos = document.getElementById('freeSpacePosition').value;
      const freeLabel = document.getElementById('freeSpaceText').value || 'FREE';
      const headers = getHeaders();
      const freeCells = getFreeCells(size, freePos);
      const freeCellSet = new Set(freeCells.map(([r, c]) => r + ',' + c));
      const rng = getRng();

      const container = document.getElementById('cardsContainer');
      container.innerHTML = '';
      container.className = 'cards-container print-' + cardsPerPage;

      if (currentMode === 'images') {
        const cellsNeeded = size * size - freeCells.length;
        if (uploadedImages.length < cellsNeeded) {
          container.innerHTML = '<div class="empty-state">Not enough images. Upload at least <strong>' +
            cellsNeeded + '</strong> images for a ' + size + '&times;' + size + ' card.</div>';
          return;
        }

        const seen = new Set();
        for (let i = 0; i < count; i++) {
          let grid, fp;
          let attempts = 0;
          do {
            const shuffled = shuffle(uploadedImages, rng);
            grid = [];
            let idx = 0;
            for (let r = 0; r < size; r++) {
              grid[r] = [];
              for (let c = 0; c < size; c++) {
                if (freeCellSet.has(r + ',' + c)) {
                  grid[r][c] = '__FREE__';
                } else {
                  grid[r][c] = shuffled[idx++];
                }
              }
            }
            // fingerprint by image index in original array
            fp = cardFingerprint(size, (r, c) => {
              if (grid[r][c] === '__FREE__') return '__FREE__';
              return uploadedImages.indexOf(grid[r][c]);
            });
            attempts++;
          } while (seen.has(fp) && attempts < 100);
          seen.add(fp);

          const getCell = (r, c) => grid[r][c];
          const card = createCardElement(i + 1, size, headers, getCell, freeCells, freeLabel);
          if (i > 0 && i % cardsPerPage === 0) {
            card.classList.add('page-break');
          }
          container.appendChild(card);
        }
      } else if (currentMode === 'custom') {
        const items = getCustomItems();
        const cellsNeeded = size * size - freeCells.length;
        if (items.length < cellsNeeded) {
          container.innerHTML = '<div class="empty-state">Not enough items. Enter at least <strong>' +
            cellsNeeded + '</strong> items for a ' + size + '&times;' + size + ' card.</div>';
          return;
        }

        const seen = new Set();
        for (let i = 0; i < count; i++) {
          let grid, fp;
          let attempts = 0;
          do {
            // Build items list excluding free cells
            const shuffled = shuffle(items, rng);
            grid = [];
            let idx = 0;
            for (let r = 0; r < size; r++) {
              grid[r] = [];
              for (let c = 0; c < size; c++) {
                if (freeCellSet.has(r + ',' + c)) {
                  grid[r][c] = '__FREE__';
                } else {
                  grid[r][c] = shuffled[idx++];
                }
              }
            }
            fp = cardFingerprint(size, (r, c) => grid[r][c]);
            attempts++;
          } while (seen.has(fp) && attempts < 100);
          seen.add(fp);

          const getCell = (r, c) => grid[r][c];
          const card = createCardElement(i + 1, size, headers, getCell, freeCells, freeLabel);

          // Page break
          if (i > 0 && i % cardsPerPage === 0) {
            card.classList.add('page-break');
          }
          container.appendChild(card);
        }
      } else {
        const rangePerCol = parseInt(document.getElementById('numberRange').value);
        const seen = new Set();

        for (let i = 0; i < count; i++) {
          let columns, fp;
          let attempts = 0;
          do {
            columns = generateNumberColumns(size, rangePerCol, rng);
            fp = cardFingerprint(size, (r, c) => {
              if (freeCellSet.has(r + ',' + c)) return '__FREE__';
              return columns[c][r];
            });
            attempts++;
          } while (seen.has(fp) && attempts < 100);
          seen.add(fp);

          const getCell = (r, c) => columns[c][r];
          const card = createCardElement(i + 1, size, headers, getCell, freeCells, freeLabel);

          if (i > 0 && i % cardsPerPage === 0) {
            card.classList.add('page-break');
          }
          container.appendChild(card);
        }
      }

      // Build print item list
      buildPrintItemList(size, freeCells);

      // On mobile, close sidebar after generating
      if (window.innerWidth <= 700) {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('open');
      }
    }

    function buildPrintItemList(size, freeCells) {
      const el = document.getElementById('printItemList');
      el.innerHTML = '';
      const cardTitle = document.getElementById('cardTitle').value.trim();

      const heading = document.createElement('h2');
      heading.textContent = (cardTitle || 'Bingo') + ' \u2014 Item List';
      el.appendChild(heading);

      if (currentMode === 'numbers') {
        const rangePerCol = parseInt(document.getElementById('numberRange').value);
        const headers = getHeaders();
        const cols = document.createElement('div');
        cols.className = 'item-columns';
        for (let col = 0; col < size; col++) {
          const min = col * rangePerCol + 1;
          const max = min + rangePerCol - 1;
          for (let n = min; n <= max; n++) {
            const entry = document.createElement('div');
            entry.className = 'item-entry';
            entry.innerHTML = '<span class="item-num">' + (headers[col] || '') + '</span>' + n;
            cols.appendChild(entry);
          }
        }
        el.appendChild(cols);
      } else if (currentMode === 'custom') {
        const items = getCustomItems();
        const cols = document.createElement('div');
        cols.className = 'item-columns';
        items.forEach(function(item, i) {
          const entry = document.createElement('div');
          entry.className = 'item-entry';
          entry.innerHTML = '<span class="item-num">' + (i + 1) + '.</span>' + item;
          cols.appendChild(entry);
        });
        el.appendChild(cols);
      } else if (currentMode === 'images') {
        const grid = document.createElement('div');
        grid.className = 'image-grid';
        uploadedImages.forEach(function(dataUrl, i) {
          const img = document.createElement('img');
          img.src = dataUrl;
          grid.appendChild(img);
        });
        el.appendChild(grid);
      }
    }

    // ── Keyboard shortcuts ──
    document.addEventListener('keydown', function(e) {
      var tag = e.target.tagName;
      var isInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';

      // Always allow standard clipboard/edit shortcuts through
      if ((e.ctrlKey || e.metaKey) && /^[acvxz]$/i.test(e.key)) return;

      // Override Ctrl+P for print
      if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
        e.preventDefault();
        safePrint();
        return;
      }

      // Enter to generate (only outside inputs)
      if (e.key === 'Enter' && !isInput) {
        e.preventDefault();
        generateCards();
      }
    });

    // ── Safe print — wait for all images to decode ──
    function safePrint() {
      var imgs = document.querySelectorAll('#cardsContainer img');
      if (imgs.length === 0) {
        window.print();
        return;
      }
      Promise.all(Array.from(imgs).map(function(img) {
        if (img.complete && img.naturalWidth > 0) return Promise.resolve();
        return img.decode().catch(function() {});
      })).then(function() {
        window.print();
      });
    }

    // ── Textarea item count updates ──
    document.getElementById('customItems').addEventListener('input', updateItemCount);
    document.getElementById('freeSpacePosition').addEventListener('change', function() {
      updateFreeSpaceVisibility();
      updateItemCount();
    });

    // ── CSS helper for .hidden ──
    const style = document.createElement('style');
    style.textContent = '.hidden { display: none !important; }';
    document.head.appendChild(style);

    // ── Init ──
    buildHeaderInputs();
    updateFreeSpaceVisibility();
    updateItemCount();
  </script>
</body>
</html>
